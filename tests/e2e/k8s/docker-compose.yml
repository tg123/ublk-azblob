# docker-compose for the ublk-azblob Kubernetes PVC e2e.
#
# Architecture:
#   1. k3s service: Runs k3s server (Kubernetes cluster) in Docker
#   2. runner service: Builds CSI driver image, deploys to k3s, runs e2e test
#
# K3s is used instead of kind because:
#   - Designed to run in containers (single process, no Docker-in-Docker needed)
#   - More stable in CI environments
#   - Better handling of host device mounts (/dev/ublk-control)
#
# Requirements on the **host** (not inside this compose stack):
#   - Docker daemon running at /var/run/docker.sock
#   - ublk_drv loaded: `sudo modprobe ublk_drv`
#
# Usage:
#   sudo modprobe ublk_drv
#   docker compose -f tests/e2e/k8s/docker-compose.yml up --build \
#     --abort-on-container-exit --exit-code-from runner
#   docker compose -f tests/e2e/k8s/docker-compose.yml down -v

services:
  # K3s server - control plane node
  k3s-server:
    image: rancher/k3s:v1.31.4-k3s1
    privileged: true
    ports:
      - "6443:6443"
    volumes:
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - k3s-data:/var/lib/rancher/k3s
      - kubeconfig:/output
    environment:
      K3S_TOKEN: "e2e-test-token"
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "644"
    command:
      - server
      - --disable=traefik,metrics-server
      - --kube-apiserver-arg=feature-gates=CSINodeExpandSecret=true
      # Allow pods to schedule on server (for single-node fallback)
      - --no-deploy=local-storage
    networks:
      - k3s
    healthcheck:
      test: ["CMD", "kubectl", "get", "--raw", "/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  # K3s agent - worker node for pod migration testing
  k3s-agent:
    image: rancher/k3s:v1.31.4-k3s1
    privileged: true
    depends_on:
      k3s-server:
        condition: service_healthy
    volumes:
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
    environment:
      K3S_TOKEN: "e2e-test-token"
      K3S_URL: "https://k3s-server:6443"
    networks:
      - k3s
    healthcheck:
      test: ["CMD", "test", "-f", "/var/lib/rancher/k3s/agent/kubelet.kubeconfig"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Test runner - builds CSI image and runs e2e test
  runner:
    build:
      context: ../../..
      dockerfile: tests/e2e/k8s/Dockerfile
    depends_on:
      k3s-server:
        condition: service_healthy
      k3s-agent:
        condition: service_healthy
    privileged: true
    volumes:
      - ../../..:/workspace
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - kubeconfig:/kubeconfig:ro
    working_dir: /workspace
    networks:
      - k3s
    environment:
      CARGO_TERM_COLOR: "always"
      DOCKER_BUILDKIT: "1"
      K8S_E2E_REQUIRE: "1"
      KUBECONFIG: /kubeconfig/kubeconfig.yaml
      K8S_E2E_USE_EXISTING_CLUSTER: "1"
      K8S_E2E_CLUSTER_NAME: "k3s"
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        
        # Wait for kubeconfig to be written
        for i in {1..30}; do
          if [ -f /kubeconfig/kubeconfig.yaml ]; then
            echo "Kubeconfig found"
            break
          fi
          echo "Waiting for kubeconfig... ($i/30)"
          sleep 1
        done
        
        # Update kubeconfig server to point to k3s service
        sed -i 's|https://127.0.0.1:6443|https://k3s-server:6443|g' /kubeconfig/kubeconfig.yaml
        
        # Verify cluster is accessible
        kubectl cluster-info
        kubectl get nodes -o wide
        
        # Wait for both nodes to be Ready
        echo "Waiting for nodes to be Ready..."
        kubectl wait --for=condition=Ready nodes --all --timeout=120s
        
        # Run the e2e test
        cargo test --release --features csi -p ublk-azblob \
          --test k8s_pvc_e2e -- --nocapture

volumes:
  k3s-data:
  kubeconfig:

networks:
  k3s:
    driver: bridge
