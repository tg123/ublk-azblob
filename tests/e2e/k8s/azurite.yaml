# Azurite (Azure Storage emulator) for the in-cluster PVC e2e.
#
# Stands in for real Azure Blob storage so the test needs no cloud credentials.
# Exposed as a ClusterIP Service named `azurite` in the kube-system namespace;
# the CSI controller and node plugins reach it via
# http://azurite.kube-system.svc.cluster.local:10000/devstoreaccount1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  namespace: kube-system
  labels:
    app: azurite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite:3.34.0
          # --loose / --skipApiVersionCheck keep Azurite happy with the (newer)
          # API version emitted by the pinned azure_storage_blob SDK.
          args:
            - azurite-blob
            - --blobHost
            - 0.0.0.0
            - --loose
            - --skipApiVersionCheck
          ports:
            - containerPort: 10000
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 2
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  namespace: kube-system
spec:
  # Fixed ClusterIP so the CSI pods' hostAliases can map
  # <account>.azurite.kube-system.svc.cluster.local to it (subdomain-style URL,
  # the same trick bbb does locally with docker extra_hosts). Must be inside the
  # k3s service CIDR (10.43.0.0/16).
  clusterIP: 10.43.0.200
  selector:
    app: azurite
  ports:
    - port: 10000
      targetPort: 10000
