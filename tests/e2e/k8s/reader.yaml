# Reader Job for the PVC e2e: mounts the *same* PVC after the writer pod is gone
# (so the volume is provisioned from scratch on a fresh ublk device over the
# existing page blob) and verifies the recorded SHA-256 still matches — proving
# the data round-tripped through the page blob and survived the remount.
apiVersion: batch/v1
kind: Job
metadata:
  name: azblob-reader
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: azblob-reader
    spec:
      restartPolicy: Never
      containers:
        - name: reader
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "verifying payload checksum on /data"
              cd /data
              sha256sum -c payload.sha256
              echo "reader verified OK"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: azblob-pvc
