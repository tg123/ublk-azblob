# docker-compose for the ublk-azblob e2e test.
#
# This brings up the whole mount e2e:
#
#   * `azurite`  — a local Azure Storage emulator (the one external service the
#     test talks to).
#   * `runner`   — builds `ublk-azblob` (`--features ublk`) and runs the Rust
#     mount e2e (`tests/mount_e2e.rs`) and NBD e2e (`tests/nbd_e2e.rs`) against
#     Azurite.
#
# The `runner` shares the host kernel: it is `privileged` and bind-mounts
# `/dev` and `/lib/modules`, so the ublk device it creates (plus `mkfs.ext4` and
# `mount`) work inside the container.  The `ublk_drv` kernel module must already
# be loaded on the *host* (`sudo modprobe ublk_drv`) — a container cannot load
# kernel modules into a kernel that lacks them.
#
# Usage (after `sudo modprobe ublk_drv` on the host):
#   docker compose -f tests/e2e/docker-compose.yml up --build \
#     --abort-on-container-exit --exit-code-from runner
#   docker compose -f tests/e2e/docker-compose.yml down -v

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.34.0
    # --skipApiVersionCheck lets Azurite accept the (newer) API version emitted
    # by the pinned azure_storage_blob SDK; --loose relaxes header validation.
    command: azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
    healthcheck:
      # Azurite is node-based (alpine, no curl).  Use node to confirm the blob
      # port is accepting connections on IPv4 (avoids the BusyBox localhost→IPv6
      # pitfall).
      test:
        - CMD
        - node
        - -e
        - "require('net').connect(10000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 2s
      timeout: 5s
      retries: 30

  runner:
    # A fixed tag so CI can pre-build this image with BuildKit + the GitHub
    # Actions cache (`docker buildx ... --cache-from/--cache-to type=gha`) and
    # have `compose up` reuse it without `--build`.  Locally `compose up
    # --build` still rebuilds it under this tag.
    image: ublk-azblob-e2e-runner:local
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
    depends_on:
      azurite:
        condition: service_healthy
    # Needs a real kernel with ublk_drv (loaded on the host) plus the ability to
    # create the ublk device, mkfs.ext4 and mount — hence privileged + host /dev.
    privileged: true
    volumes:
      - ../..:/workspace
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
    working_dir: /workspace
    environment:
      # Reach Azurite over the compose network rather than via localhost.
      AZURE_STORAGE_ENDPOINT: "http://azurite:10000/devstoreaccount1"
      CARGO_TERM_COLOR: "always"
      # Persist the cargo registry/git cache on a host path (under the
      # bind-mounted workspace) so it survives the container and can be picked
      # up by `actions/cache` in CI.  `target/` already lands in the
      # bind-mounted /workspace/target, so it is cached the same way.
      CARGO_HOME: "/workspace/.cargo-home"
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        cargo build --release --features ublk -p ublk-azblob
        cargo test --release --features ublk -p ublk-azblob \
          --test mount_e2e -- --nocapture --test-threads=1
        # NBD compatibility e2e: pure TCP, no kernel module or ublk feature
        # required, but reuse the same Azurite-backed runner.
        cargo test --release --features ublk -p ublk-azblob \
          --test nbd_e2e -- --nocapture --test-threads=1
