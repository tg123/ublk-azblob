# e2e test pipeline for ublk-azblob
#
# Spins up Azurite (Azure Storage emulator) and a test-runner that builds the
# Rust binary and runs a full createâ†’writeâ†’read-verifyâ†’clearâ†’zero-verify cycle
# against the Page Blob API.
#
# Usage:
#   docker compose -f tests/e2e/docker-compose.yml \
#     up --build --abort-on-container-exit --exit-code-from test-runner

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.34.0
    command: azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      AZURE_STORAGE_ACCOUNT: devstoreaccount1
      # Azurite well-known development key
      AZURE_STORAGE_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw=="
      AZURE_STORAGE_ENDPOINT: "http://azurite:10000/devstoreaccount1"
      AZURE_STORAGE_CONTAINER: e2etest
      AZURE_STORAGE_BLOB: testblob
      # Size: 1 MiB (must be multiple of 512)
      BLOB_SIZE: "1048576"
