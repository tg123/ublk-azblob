name: k8s-e2e

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  k8s-pvc:
    name: k8s PVC e2e (k3s + ublk + Azurite)
    # The ublk_drv kernel module Oopses on the ubuntu-24.04 azure kernel
    # (actions/runner-images#14175); 22.04 ships a stable 6.x kernel.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Make /var/lib/kubelet a shared mount
        run: |
          sudo mkdir -p /var/lib/kubelet
          sudo mount -t tmpfs tmpfs /var/lib/kubelet
          sudo mount --make-shared /var/lib/kubelet

      - name: Load ublk_drv kernel module
        run: |
          sudo apt-get update
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe ublk_drv
          ls -l /dev/ublk-control

      - name: Run k8s PVC e2e (docker compose with k3s)
        run: |
          docker compose -f tests/e2e/k8s/docker-compose.yml up \
            --build --abort-on-container-exit --exit-code-from runner

      - name: Tear down the compose stack
        if: always()
        run: |
          docker compose -f tests/e2e/k8s/docker-compose.yml down -v || true
