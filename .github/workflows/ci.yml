name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-unit:
    name: fmt / clippy / unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install build dependencies (protoc + libclang for all features)
        run: |
          sudo apt-get update
          # protobuf-compiler + libprotobuf-dev: protoc and the well-known types
          #   (google/protobuf/*.proto) imported by csi.proto.
          # libclang-dev: libclang for the libublk bindgen (ublk feature).
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libprotobuf-dev libclang-dev

      - name: cargo fmt --check
        run: cargo fmt --check

      # Lint and test the full shipped feature set in one pass — we never ship a
      # partially-compiled binary, so CI checks everything together.  `ublk` and
      # `csi` are on by default, so no extra feature flags are needed.
      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo clippy (ublk feature — kernel target compiles)
        run: cargo clippy --features ublk -- -D warnings

      - name: cargo clippy (bench feature)
        run: cargo clippy --features bench -- -D warnings

      - name: cargo test (unit tests, MemBackend — no kernel required)
        run: cargo test

      - name: cargo test (all features)
        run: cargo test --all-features
