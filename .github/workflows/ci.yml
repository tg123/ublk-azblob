name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-unit:
    name: fmt / clippy / unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo clippy (ublk feature — kernel target compiles)
        run: cargo clippy --features ublk -- -D warnings

      - name: Install protoc (CSI codegen)
        run: |
          sudo apt-get update
          # libprotobuf-dev ships the well-known types (google/protobuf/*.proto)
          # that csi.proto imports; protobuf-compiler alone no longer includes them.
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: cargo clippy (csi feature)
        run: cargo clippy --features csi -- -D warnings

      - name: cargo clippy (ublk + csi features)
        run: cargo clippy --features "ublk csi" -- -D warnings

      - name: cargo test (unit tests, MemBackend — no kernel required)
        run: cargo test

      - name: cargo test (csi feature unit tests)
        run: cargo test --features csi
