name: e2e

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    name: e2e
    # The ublk_drv kernel module Oopses on the ubuntu-24.04 azure kernel
    # (actions/runner-images#14175); 22.04 ships a stable 6.x kernel.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Load ublk_drv kernel module
        run: |
          sudo apt-get update
          # The generic GitHub runner kernel ships ublk_drv in linux-modules-extra.
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe ublk_drv
          ls -l /dev/ublk-control

      - name: Make a shared mount for CSI mount propagation
        run: |
          sudo mkdir -p /tmp/ublk-e2e/kubelet
          sudo mount -t tmpfs tmpfs /tmp/ublk-e2e/kubelet
          sudo mount --make-shared /tmp/ublk-e2e/kubelet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e2e runner image (BuildKit + GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/e2e/Dockerfile
          tags: ublk-azblob-e2e-runner:local
          load: true
          cache-from: type=gha,scope=e2e-runner
          cache-to: type=gha,mode=max,scope=e2e-runner

      - name: Cache cargo registry and target
        # The compile happens inside the runner container, which writes
        # CARGO_HOME to /workspace/.cargo-home and target/ to /workspace/target
        # (both on the bind-mounted checkout).
        uses: actions/cache@v4
        with:
          path: |
            .cargo-home/registry/index
            .cargo-home/registry/cache
            .cargo-home/git/db
            target
          key: e2e-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            e2e-cargo-${{ runner.os }}-

      - name: Run e2e (compile once, mount + NBD + k8s PVC)
        # The `runner` service builds with --features ublk and runs the ublk
        # mount/remount/checksum tests (including the read-only mount test),
        # the NBD roundtrip + read-only tests, and the k8s PVC tests; Azurite is
        # brought up as its dependency.
        run: |
          KUBELET_DIR=/tmp/ublk-e2e/kubelet \
          docker compose -f tests/e2e/docker-compose.yml up \
            --abort-on-container-exit --exit-code-from runner

      - name: Normalize cache ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" .cargo-home target || true

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f tests/e2e/docker-compose.yml logs || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v || true
