name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-unit:
    name: fmt / clippy / unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo clippy (ublk feature — kernel target compiles)
        run: cargo clippy --features ublk -- -D warnings

      - name: cargo test (unit tests, MemBackend — no kernel required)
        run: cargo test

  e2e:
    name: e2e (mount ext4 on /dev/ublkb backed by Azurite)
    # The ublk_drv kernel module Oopses on the ubuntu-24.04 azure kernel
    # (actions/runner-images#14175); 22.04 ships a stable 6.x kernel.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Load ublk_drv kernel module
        run: |
          sudo apt-get update
          # The generic GitHub runner kernel ships ublk_drv in linux-modules-extra.
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe ublk_drv
          ls -l /dev/ublk-control

      - name: Install e2fsprogs (mkfs.ext4)
        run: sudo apt-get install -y e2fsprogs

      - name: Start Azurite
        run: |
          docker run -d --name azurite -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite:3.34.0 \
            azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck
          # Wait for the blob endpoint to start responding (any HTTP status
          # means Azurite is up; the account root returns 400 without auth).
          for _ in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:10000/devstoreaccount1 || true)"
            if [ "${code}" != "000" ]; then
              echo "Azurite responding (HTTP ${code})"
              break
            fi
            sleep 1
          done

      - name: Build ublk-azblob (--features ublk)
        run: cargo build --release --features ublk -p ublk-azblob

      - name: Run mount e2e (mount → write → flush → unmount → remount → verify)
        run: |
          sudo -E env "PATH=$PATH" \
            AZURE_STORAGE_ENDPOINT="http://127.0.0.1:10000/devstoreaccount1" \
            cargo test --release --features ublk -p ublk-azblob --test mount_e2e -- --nocapture --test-threads=1

      - name: Azurite logs on failure
        if: failure()
        run: docker logs azurite || true
