name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-unit:
    name: fmt / clippy / unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo clippy (ublk feature — kernel target compiles)
        run: cargo clippy --features ublk -- -D warnings

      - name: cargo test (unit tests, MemBackend — no kernel required)
        run: cargo test

  e2e:
    name: e2e (mount ext4 on /dev/ublkb backed by Azurite)
    # The ublk_drv kernel module Oopses on the ubuntu-24.04 azure kernel
    # (actions/runner-images#14175); 22.04 ships a stable 6.x kernel.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Load ublk_drv kernel module
        run: |
          sudo apt-get update
          # The generic GitHub runner kernel ships ublk_drv in linux-modules-extra.
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe ublk_drv
          ls -l /dev/ublk-control

      - name: Run mount e2e (build + test in docker compose runner)
        # The `runner` service builds with --features ublk and runs the Rust
        # mount/remount/checksum test; Azurite is brought up as its dependency.
        run: |
          docker compose -f tests/e2e/docker-compose.yml up \
            --build --abort-on-container-exit --exit-code-from runner

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f tests/e2e/docker-compose.yml logs || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v || true
