name: docker

# Builds the CSI driver image (deploy/Dockerfile) and publishes it to both
# GitHub Container Registry (ghcr.io) and Docker Hub.
#
# GHCR uses the built-in GITHUB_TOKEN. Docker Hub is optional: the push is
# skipped automatically unless the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
# repository secrets are configured.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Build the image and run a health check *against the image itself* before
  # publishing: the static binary must run and the userspace tools the node
  # plugin shells out to (mkfs.ext4 / mount / umount / blkid) must be present.
  # The amd64 layers are cached (type=gha) and reused by the publish job below.
  verify:
    name: verify image is healthy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ublk-azblob:verify
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image health check
        run: |
          set -euo pipefail
          img=ublk-azblob:verify

          echo "::group::binary runs (--help)"
          docker run --rm "$img" --help
          echo "::endgroup::"

          echo "::group::bundled userspace tools present"
          docker run --rm --entrypoint sh "$img" -ec '
            for tool in mkfs.ext4 mount umount blkid; do
              if command -v "$tool" >/dev/null 2>&1; then
                echo "ok: $tool -> $(command -v "$tool")"
              else
                echo "MISSING: $tool" >&2
                exit 1
              fi
            done
          '
          echo "::endgroup::"

          echo "::group::binary's shared libraries all resolve"
          # The image ships a Debian/glibc dynamically-linked binary, so verify
          # every shared-library dependency resolves inside the runtime image
          # (a missing lib would show up as "not found").
          docker run --rm --entrypoint sh "$img" -ec '
            out=$(ldd /usr/local/bin/ublk-azblob 2>&1)
            echo "$out"
            if printf "%s" "$out" | grep -q "not found"; then
              echo "ERROR: unresolved shared library dependency" >&2
              exit 1
            fi
            echo "ok: all shared library dependencies resolve"
          '
          echo "::endgroup::"

  publish:
    name: build + publish image (GHCR + Docker Hub)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets not set; skipping Docker Hub push."
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            name=docker.io/farmer1992/ublk-azblob,enable=${{ steps.dockerhub.outputs.enabled }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
