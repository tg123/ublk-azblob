name: release

# Builds fully-static (musl) `ublk-azblob` binaries for linux/amd64 and
# linux/arm64 and publishes them as downloadable assets on the GitHub Release.
#
# Triggered automatically when a `v*` tag is pushed, or manually via
# workflow_dispatch (handy for testing — assets are then attached to a
# pre-release named after the chosen tag, or just built as artifacts).
#
# The binaries are statically linked against musl libc (no glibc, no shared
# objects), so they run on any modern x86-64 / aarch64 Linux host without
# installing a runtime. Verify with `ldd ublk-azblob` -> "not a dynamic
# executable".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build static ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (musl target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # musl-tools : musl-gcc, the C compiler ring / libublk's C shim link
          #              against for a fully-static musl binary.
          # protobuf-compiler + libprotobuf-dev : protoc + well-known types for
          #              the CSI gRPC bindings (csi feature).
          # clang + libclang-dev : libclang for the libublk bindgen (ublk feature).
          sudo apt-get install -y --no-install-recommends \
            musl-tools clang libclang-dev protobuf-compiler libprotobuf-dev pkg-config

      - name: Build fully-static binary (ublk + csi)
        env:
          # Point the musl target's C compiler at musl-gcc so the bundled C code
          # (ring, libublk shim) is compiled and linked against musl libc.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --locked \
            --target ${{ matrix.target }} \
            -p ublk-azblob --features "ublk csi"

      - name: Package
        id: package
        run: |
          bin=target/${{ matrix.target }}/release/ublk-azblob
          # Confirm it really is a static binary; fail the build otherwise.
          file "$bin"
          ldd_out="$(ldd "$bin" 2>&1 || true)"
          echo "$ldd_out"
          echo "$ldd_out" | grep -qiE "not a dynamic executable|statically linked" || \
            { echo "::error::binary is not statically linked"; exit 1; }
          strip "$bin" || true

          name="ublk-azblob-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "$bin" "dist/$name/ublk-azblob"
          cp README.md LICENSE.md "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          ( cd dist && sha256sum "$name.tar.gz" > "$name.tar.gz.sha256" )
          echo "asset=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ublk-azblob-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: publish to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
