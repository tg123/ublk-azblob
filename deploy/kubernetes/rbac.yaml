# RBAC for the ublk-azblob CSI driver.
#
# Two service accounts:
#   * controller — used by the controller Deployment and its
#     external-provisioner sidecar (needs to watch PVCs and create/delete PVs).
#   * node       — used by the node DaemonSet and its
#     node-driver-registrar sidecar (minimal permissions).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-ublk-azblob-controller
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-ublk-azblob-node
  namespace: kube-system
---
# Permissions required by the external-provisioner sidecar.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csi-ublk-azblob-provisioner-role
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-ublk-azblob-provisioner-binding
subjects:
  - kind: ServiceAccount
    name: csi-ublk-azblob-controller
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: csi-ublk-azblob-provisioner-role
  apiGroup: rbac.authorization.k8s.io
