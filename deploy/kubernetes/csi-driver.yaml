# CSIDriver object: registers the ublk-azblob driver with Kubernetes.
#
# - attachRequired: false  → no ControllerPublish/Attach stage; the node plugin
#   attaches the ublk device directly in NodePublishVolume.
# - podInfoOnMount: false  → the driver does not need pod metadata at mount time.
# - volumeLifecycleModes: Persistent (PVC-backed volumes).
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: azblob.ublk.csi.tg123.github.io
spec:
  attachRequired: false
  podInfoOnMount: false
  fsGroupPolicy: File
  volumeLifecycleModes:
    - Persistent
