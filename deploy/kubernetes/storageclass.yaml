# StorageClass for ublk-azblob volumes.
#
# Each PVC using this class is provisioned as one Azure Page Blob in the named
# container and exposed as an ext4 filesystem on a ublk block device.
#
# `volumeBindingMode: WaitForFirstConsumer` defers provisioning until a pod is
# scheduled, so the volume is created on demand.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azblob-ublk
provisioner: azblob.ublk.csi.tg123.github.io
parameters:
  # Blob container that holds the page blobs (must already exist or be
  # creatable by the configured credentials).
  container: pvc
  # Filesystem created on first mount.
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: false
