# StorageClass for ublk-azblob volumes.
#
# Credentials are loaded from the global `csi-ublk-azblob-secret` in kube-system
# by the CSI provisioner (CreateVolume) and the node plugin (NodePublishVolume).
#
# All parameters support variable expansion:
#   ${pvc.namespace} - PVC namespace
#   ${pvc.name}      - PVC name
#   ${pv.name}       - PV name (auto-generated: pvc-<uuid>)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azblob-ublk
provisioner: azblob.ublk.csi.tg123.github.io
parameters:
  # Secret references (CSI provisioner / node plugin load these)
  csi.storage.k8s.io/provisioner-secret-name: csi-ublk-azblob-secret
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system
  csi.storage.k8s.io/node-publish-secret-name: csi-ublk-azblob-secret
  csi.storage.k8s.io/node-publish-secret-namespace: kube-system
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: false
