# Controller plug-in: provisions / deletes the Azure Page Blob behind each PVC.
#
# Runs the ublk-azblob CSI controller service alongside the upstream
# external-provisioner sidecar.  They communicate over a shared unix socket in
# an emptyDir.  A single replica is sufficient (provisioning is idempotent).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csi-ublk-azblob-controller
  namespace: kube-system
  labels:
    app: csi-ublk-azblob-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csi-ublk-azblob-controller
  template:
    metadata:
      labels:
        app: csi-ublk-azblob-controller
    spec:
      serviceAccountName: csi-ublk-azblob-controller
      containers:
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.1.0
          args:
            - "--csi-address=/csi/csi.sock"
            - "--extra-create-metadata"
            - "--v=2"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: azblob
          image: docker.io/farmer1992/ublk-azblob:latest
          imagePullPolicy: IfNotPresent
          args:
            - "csi"
            - "--role=controller"
            - "--csi-endpoint=unix:///csi/csi.sock"
          env:
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: csi-ublk-azblob-secret
                  key: account
            - name: AZURE_STORAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: csi-ublk-azblob-secret
                  key: accountKey
            - name: AZURE_STORAGE_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: csi-ublk-azblob-config
                  key: container
            - name: AZURE_STORAGE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: csi-ublk-azblob-config
                  key: endpoint
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: socket-dir
          emptyDir: {}
