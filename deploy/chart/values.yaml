# Default values for ublk-azblob-csi.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Secret search mode: where the driver looks up the storage credentials secret.
# - per-namespace: Each namespace creates its own azblob-csi-secret
# - global: One secret in kube-system shared by all namespaces
secretSearchMode: per-namespace

# Driver configuration
driver:
  name: azblob.ublk.csi.tg123.github.io

# Container image for both the controller and node plugins.
image:
  repository: docker.io/farmer1992/ublk-azblob
  tag: latest
  pullPolicy: IfNotPresent

# Controller deployment configuration
controller:
  replicas: 1

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Node DaemonSet configuration
node:
  # Use NBD (Network Block Device) instead of ublk (for older kernels)
  # When enabled, uses NBD protocol instead of ublk_drv kernel module
  # - Requires nbd kernel module (available in most kernels)
  # - Does not require ublk_drv (Linux >= 6.0)
  # - Slightly lower performance than ublk
  useNbd: false
  
  # NBD configuration (only used when useNbd: true)
  nbd:
    # Port range start for NBD servers (each volume gets its own port)
    # Default: 10809
    portStart: 10809

  # Local-disk cache shared by every volume process on the node.
  # When enabled, a host directory is mounted into the node plugin and each
  # volume's `run` child caches blob pages there. The byte budget is enforced
  # across all volumes sharing the directory (LRU eviction of clean pages).
  cache:
    # Enable the local-disk cache. When false, no cache directory is wired up
    # and volumes stream directly to/from the blob.
    enabled: false

    # Host directory used as the cache, shared by every volume on the node.
    # Mounted into the node plugin container at the same path.
    hostPath: /var/lib/ublk-azblob/cache

    # Maximum total cache size in bytes, shared across all volumes using the
    # directory above. 0 = unlimited (grow-only).
    maxBytes: 0

    # Cache page size in bytes (the local-disk cache granularity).
    pageSize: 1048576

    # Cross-process clean-page sharing. NOTE: currently a no-op — the node
    # binary forces sharing OFF (the flag is accepted but ignored), so every
    # volume's cache is single-process for now. When re-enabled, volumes on the
    # node that cache the *same* blob would serve each other's already-fetched
    # clean pages directly off the shared cache directory (via a flock-coordinated
    # `.cache-index`), avoiding redundant blob reads. Each volume still writes
    # only its own data file (copy-on-write on a dirtying write), so a write to
    # one volume never affects another. The node plugin gives each volume a
    # unique, stable cache instance (its volume id) automatically.
    sharePages: false

    # Background cache warm-up: each volume prefetches its blob into the cache on
    # start (in the background; the device comes online immediately). Best for
    # read-only / read-mostly datasets (e.g. an immutable snapshot golden image)
    # that fit the cache budget.
    warmup: false

    # Cap in bytes for warm-up. 0 = auto (the cache byte budget when set, else the
    # whole device).
    warmupBytes: 0

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  nodeSelector: {}
  tolerations:
    - operator: Exists
  affinity: {}

# CSI sidecar images (external-provisioner, node-driver-registrar)
sidecars:
  provisioner:
    image:
      repository: registry.k8s.io/sig-storage/csi-provisioner
      tag: v5.1.0
    # CreateVolume/DeleteVolume RPC timeout. Raise this when provisioning large
    # read-write `templateBlobUrl` volumes, since the controller copies the whole
    # template synchronously within CreateVolume.
    timeout: 60s
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  
  registrar:
    image:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.12.0
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# StorageClass configuration
storageClass:
  # Create StorageClass (set to false if you want to create your own)
  create: true
  
  # StorageClass name
  name: azblob-ublk
  
  # Default StorageClass
  isDefault: false
  
  # Reclaim policy: Delete or Retain
  reclaimPolicy: Delete
  
  # Volume binding mode: WaitForFirstConsumer or Immediate
  volumeBindingMode: WaitForFirstConsumer
  
  # Allow volume expansion
  allowVolumeExpansion: false
  
  # Parameters (all support variable expansion: ${pvc.namespace}, ${pvc.name}, ${pv.name})
  parameters:
    # Storage account (optional - uses secret value if omitted)
    # Use single quotes to avoid any shell/YAML interpretation
    # storageAccount: '${pvc.namespace}storage'
    
    # Container name (optional - uses secret value if omitted)
    container: "ublk-azblob-volumes"
    
    # Blob path template within container
    # Default: "ublk-azblob-disk/${pv.name}"
    # Use single quotes to preserve ${...} variables literally
    blobPathTemplate: '${pvc.namespace}/volumes/${pv.name}'
    
    # Filesystem type: ext4, xfs, btrfs, etc.
    fsType: ext4

    # Run fsck before mounting an already-formatted, writable volume.
    #   - "false"/"off" (default): never run fsck
    #   - "true"/"preen":          `fsck -a` (auto-repair safe problems)
    #   - "force":                 `fsck -f -y` (force a full check, repair all)
    # Skipped for freshly-formatted and read-only volumes (which can't be
    # repaired in place).
    # fsck: "preen"
    # Provision the volume from a golden-image *template* blob. Full Azure blob
    # URL, optionally carrying a SAS token and/or a `?snapshot=` query. With no
    # SAS, the driver authenticates the template with its own credentials (the
    # template must then be reachable with those creds). Read-only is determined
    # solely by whether the URL targets a snapshot — there is no readOnly param.
    #   - a snapshot URL (`?snapshot=`) mounts the (immutable) template directly
    #     — no copy, no cluster lock/lease (so many PVCs can share one golden
    #     image), and the local cache is safe to reuse; DeleteVolume never
    #     deletes the template.
    #   - a non-snapshot template is copied into a fresh per-PVC blob (read-write)
    #     and formatting is skipped (the copy is already a filesystem).
    # templateBlobUrl: 'https://acct.blob.core.windows.net/images/golden.vhd?snapshot=...'

# Secret configuration for global mode
# Only used when secretSearchMode: global
globalSecret:
  # Create the global secret (set to false if you manage it externally)
  create: false
  
  # Secret name in kube-system namespace
  name: csi-ublk-azblob-secret
  
  # Authentication method: "service-principal", "workload-identity", or "shared-key"
  authMethod: service-principal
  
  # Service Principal credentials (authMethod: service-principal)
  servicePrincipal:
    clientId: ""
    tenantId: ""
    clientSecret: ""
  
  # Workload Identity (authMethod: workload-identity)
  workloadIdentity:
    clientId: ""
    tenantId: ""
  
  # SharedKey credentials (authMethod: shared-key)
  sharedKey:
    accountKey: ""
  
  # Storage account configuration
  storageAccount: ""
  storageContainer: ""
  
  # Optional: Custom endpoint (for Azurite or sovereign clouds).
  # Use the `%s` template for the account name, e.g.
  #   http://%s.blob.localhost:10000/   or   https://%s.blob.core.usgovcloudapi.net/
  # `%s` is replaced with the storage account so it becomes the host's first DNS
  # label (subdomain-style). Leave empty for standard Azure public cloud.
  endpoint: ""

# Per-namespace secret configuration
# Only used when secretSearchMode: per-namespace
perNamespaceSecret:
  # Secret name (must be created in each namespace)
  name: azblob-csi-secret

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# ServiceAccount configuration
serviceAccount:
  controller:
    create: true
    name: csi-ublk-azblob-controller
    annotations: {}
  
  node:
    create: true
    name: csi-ublk-azblob-node
    annotations: {}

# Additional StorageClasses
# Example: Create multiple StorageClasses for different use cases
additionalStorageClasses: []
  # - name: azblob-xfs
  #   isDefault: false
  #   reclaimPolicy: Delete
  #   volumeBindingMode: WaitForFirstConsumer
  #   allowVolumeExpansion: false
  #   parameters:
  #     container: "database-volumes"
  #     blobPathTemplate: '${pvc.namespace}/db/${pv.name}'
  #     fsType: xfs
  #
  # - name: azblob-per-tenant
  #   isDefault: false
  #   reclaimPolicy: Delete
  #   volumeBindingMode: WaitForFirstConsumer
  #   allowVolumeExpansion: false
  #   parameters:
  #     storageAccount: '${pvc.namespace}storage'
  #     container: '${pvc.namespace}'
  #     blobPathTemplate: 'volumes/${pv.name}'
  #     fsType: ext4
  #
  # ── Golden-image (templateBlobUrl) StorageClasses ───────────────────────────
  #
  # Read-only mount of a shared golden image: point templateBlobUrl at a blob
  # *snapshot* (`?snapshot=`). Many PVCs mount the immutable snapshot directly —
  # no copy, no cluster lock/lease, and the local cache is safe to reuse. The
  # volume id is tagged `ro:` so DeleteVolume never deletes the template; pair it
  # with reclaimPolicy: Retain and Immediate binding.
  # - name: azblob-template-ro
  #   isDefault: false
  #   reclaimPolicy: Retain
  #   volumeBindingMode: Immediate
  #   allowVolumeExpansion: false
  #   parameters:
  #     templateBlobUrl: 'https://acct.blob.core.windows.net/images/golden.vhd?snapshot=2026-01-02T03:04:05.0Z'
  #
  # Read-write copy of a golden image: the controller server-side copies the
  # template into a fresh per-PVC blob and the node skips mkfs. Set storageAccount
  # to the destination account (may differ from the template's). Large copies may
  # need a higher sidecars.provisioner.timeout.
  # - name: azblob-template-rw
  #   isDefault: false
  #   reclaimPolicy: Delete
  #   volumeBindingMode: Immediate
  #   allowVolumeExpansion: false
  #   parameters:
  #     storageAccount: 'mydeststorage'
  #     container: '${pvc.namespace}'
  #     blobPathTemplate: '${pvc.namespace}/tmpl/${pv.name}'
  #     fsType: ext4
  #     templateBlobUrl: 'https://acct.blob.core.windows.net/images/golden.vhd'

# Namespace where CSI driver components are deployed
namespace: kube-system
