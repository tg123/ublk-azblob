{{- if and (eq .Values.secretSearchMode "global") .Values.globalSecret.create -}}
# Global secret in {{ .Values.namespace }} namespace
# All namespaces share the same Azure storage account and credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.globalSecret.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ublk-azblob-csi.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.globalSecret.authMethod "service-principal" }}
  # Service Principal authentication
  AZURE_CLIENT_ID: {{ .Values.globalSecret.servicePrincipal.clientId | quote }}
  AZURE_TENANT_ID: {{ .Values.globalSecret.servicePrincipal.tenantId | quote }}
  AZURE_CLIENT_SECRET: {{ .Values.globalSecret.servicePrincipal.clientSecret | quote }}
  {{- else if eq .Values.globalSecret.authMethod "workload-identity" }}
  # Workload Identity authentication
  AZURE_CLIENT_ID: {{ .Values.globalSecret.workloadIdentity.clientId | quote }}
  AZURE_TENANT_ID: {{ .Values.globalSecret.workloadIdentity.tenantId | quote }}
  {{- else if eq .Values.globalSecret.authMethod "shared-key" }}
  # SharedKey authentication. The key name must be `accountKey` — that's what the
  # driver reads from the CSI secrets map (see csi/mod.rs + csi/node.rs).
  accountKey: {{ .Values.globalSecret.sharedKey.accountKey | quote }}
  {{- end }}
  
  {{- if .Values.globalSecret.storageAccount }}
  # Storage account configuration
  AZURE_STORAGE_ACCOUNT: {{ .Values.globalSecret.storageAccount | quote }}
  {{- end }}
  {{- if .Values.globalSecret.storageContainer }}
  AZURE_STORAGE_CONTAINER: {{ .Values.globalSecret.storageContainer | quote }}
  {{- end }}
  {{- if .Values.globalSecret.endpoint }}
  AZURE_STORAGE_ENDPOINT: {{ .Values.globalSecret.endpoint | quote }}
  {{- end }}
{{- end }}
