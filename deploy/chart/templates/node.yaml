# Node plug-in: attaches the ublk device and mounts the filesystem on each node.
#
# Runs on every node as a DaemonSet alongside the upstream
# node-driver-registrar sidecar.  The plug-in is privileged and shares the host
# /dev (to create and see /dev/ublkbN) and /var/lib/kubelet with Bidirectional
# mount propagation (so the filesystem it mounts is visible to the kubelet and
# can be bind-mounted into application pods).
#
# The ublk_drv kernel module must already be loaded on the host
# (`sudo modprobe ublk_drv`); a container cannot load it.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ublk-azblob-csi.fullname" . }}-node
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ublk-azblob-csi.node.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "ublk-azblob-csi.fullname" . }}-node
  template:
    metadata:
      labels:
        app: {{ include "ublk-azblob-csi.fullname" . }}-node
        {{- include "ublk-azblob-csi.node.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ublk-azblob-csi.node.serviceAccountName" . }}
      {{- with .Values.node.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-driver-registrar
          image: {{ .Values.sidecars.registrar.image.repository }}:{{ .Values.sidecars.registrar.image.tag }}
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/{{ .Values.driver.name }}/csi.sock"
            - "--v=2"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
          {{- with .Values.sidecars.registrar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: azblob
          image: {{ .Values.node.image.repository }}:{{ .Values.node.image.tag }}
          imagePullPolicy: {{ .Values.node.image.pullPolicy }}
          securityContext:
            privileged: true
          args:
            - "csi"
            - "--role=node"
            - "--csi-endpoint=unix:///csi/csi.sock"
          env:
            - name: CSI_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.node.useNbd }}
            # NBD mode configuration
            - name: USE_NBD
              value: "true"
            - name: NBD_PORT_START
              value: {{ .Values.node.nbd.portStart | quote }}
            {{- end }}
          # No hardcoded credentials - come from per-namespace or global secrets at mount time
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: dev-dir
              mountPath: /dev
            - name: modules-dir
              mountPath: /lib/modules
              readOnly: true
          {{- with .Values.node.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/{{ .Values.driver.name }}
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: dev-dir
          hostPath:
            path: /dev
            type: Directory
        - name: modules-dir
          hostPath:
            path: /lib/modules
            type: DirectoryOrCreate
